<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blander | News Headline Neutralizer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      width: 250px;
      padding: 15px;
      color: #333;
    }
    
    h1 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 15px;
      text-align: center;
      color: #333;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    
    .toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #4a90e2;
    }
    
    input:focus + .slider {
      box-shadow: 0 0 1px #4a90e2;
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    
    .status {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .active {
      background-color: #4caf50;
    }
    
    .inactive {
      background-color: #f44336;
    }
    
    .stats {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
    }
    
    .button {
      display: block;
      width: 100%;
      padding: 8px 0;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      color: #333;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #e5e5e5;
    }
    
    .api-key-warning {
      background-color: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 15px;
      font-size: 12px;
      color: #856404;
      display: none;
    }
    
    .api-key-warning a {
      color: #856404;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    
    .api-key-ok {
      font-size: 12px;
      color: #4caf50;
      margin-bottom: 15px;
      display: none;
    }
    
    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    
    .footer-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .footer-buttons .button {
      flex: 1;
    }
  </style>
</head>
<body>
  <h1>Blander</h1>
  
  <div class="toggle-container">
    <span>Enable on NYTimes</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="status">
    <div id="status-indicator" class="status-indicator"></div>
    <span id="status-text">Checking status...</span>
  </div>
  
  <div class="stats">
    <div id="headline-count">Headlines neutralized: 0</div>
  </div>
  
  <div id="api-key-warning" class="api-key-warning">
    API key not configured. <a id="configure-key-link">Set up now</a>
  </div>
  <div id="api-key-ok" class="api-key-ok">API key configured</div>
  
  <div class="footer-buttons">
    <a id="options-button" class="button">Statistics</a>
    <a id="settings-button" class="button">Settings</a>
  </div>
  
  <div class="footer">
    <p>Only works on nytimes.com</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
